<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻旅骑行 - 路线探索</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    colors: {
                        nature: {
                            50: '#f4f7f4',
                            100: '#e3ebe3',
                            500: '#4caf50',
                            600: '#388e3c',
                            900: '#1b4332',
                        },
                        earth: {
                            100: '#fdf8f5',
                            500: '#d97706',
                        }
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'floating': '0 20px 40px -10px rgba(76, 175, 80, 0.15)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f8faf8;
            color: #2c3e50;
            overflow-x: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .hide-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 20px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #4caf50;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #4caf50;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #e3ebe3;
            border-radius: 99px;
        }
        input[type=range]:focus {
            outline: none;
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #4caf50;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1);
            background-color: #ffffff;
        }
        #map {
            z-index: 10;
        }
        .map-overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .leaflet-control-attribution {
            background: rgba(255,255,255,0.7) !important;
            backdrop-filter: blur(4px);
            color: #666 !important;
        }
        .loader {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-enter {
            transform: translateX(120%);
        }
        .toast-show {
            transform: translateX(0);
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col lg:grid lg:grid-cols-12 gap-4 lg:gap-6 p-4 lg:p-6 box-border">

    <!-- Toast 通知 -->
    <div id="toast" class="fixed top-6 right-6 z-50 glass-panel shadow-soft rounded-2xl px-6 py-4 flex items-center gap-3 transition-transform duration-500 ease-out toast-enter border-l-4 hidden">
        <svg id="toast-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toast-msg" class="text-gray-700 font-medium">发生错误</span>
    </div>

    <!-- ===== 左侧：表单面板 ===== -->
    <aside class="lg:col-span-3 flex flex-col h-full overflow-y-auto hide-scrollbar gap-6 pb-6 lg:pb-0">
        <div class="flex items-center gap-3 px-2 pt-2">
            <div class="w-10 h-10 rounded-full bg-nature-100 flex items-center justify-center text-nature-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800 tracking-wide">轻旅骑行</h1>
                <p class="text-xs text-gray-500">规划你的自然之旅</p>
            </div>
        </div>

        <div class="glass-panel shadow-soft rounded-3xl p-6 flex flex-col gap-6">
            <div class="flex flex-col gap-4 relative">
                <div class="absolute left-4 top-10 bottom-10 w-0.5 bg-gray-200 border-dashed border-l-2"></div>

                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-nature-500 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <input type="text" id="start-input" placeholder="起点 (如: 北京天安门)" class="input-field w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none" value="北京天安门">
                </div>
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-earth-500 z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <input type="text" id="end-input" placeholder="终点 (如: 颐和园)" class="input-field w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none" value="颐和园">
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="flex flex-col gap-5">
                <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    路线偏好
                </h3>

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-600">最大距离</span>
                        <span class="text-nature-600 font-medium bg-nature-50 px-2 py-0.5 rounded-md" id="dist-val">50 km</span>
                    </div>
                    <input type="range" id="max-dist" min="5" max="200" value="50" step="1">
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-gray-600">最大爬升</span>
                        <span class="text-nature-600 font-medium bg-nature-50 px-2 py-0.5 rounded-md" id="elev-val">无限制</span>
                    </div>
                    <input type="range" id="max-elev" min="0" max="5000" value="0" step="50">
                </div>

                <div class="grid grid-cols-2 gap-3 mt-1">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">路面类型</label>
                        <select id="surface-type" class="input-field w-full px-3 py-2.5 bg-gray-50 border border-gray-100 rounded-xl text-sm text-gray-700 focus:outline-none appearance-none">
                            <option value="">不限</option>
                            <option value="paved">铺装路面</option>
                            <option value="mixed">混合路面</option>
                            <option value="gravel">碎石路面</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">路线难度</label>
                        <select id="difficulty" class="input-field w-full px-3 py-2.5 bg-gray-50 border border-gray-100 rounded-xl text-sm text-gray-700 focus:outline-none appearance-none">
                            <option value="">自动推荐</option>
                            <option value="easy">轻松悠闲</option>
                            <option value="moderate">进阶锻炼</option>
                            <option value="challenging">硬核挑战</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="plan-btn" class="mt-2 w-full py-3.5 rounded-xl bg-nature-500 hover:bg-nature-600 text-white font-medium shadow-floating transition-all duration-300 flex justify-center items-center">
                <span id="btn-text">开始规划路线</span>
            </button>
        </div>
    </aside>

    <!-- ===== 中间：地图区域 ===== -->
    <main class="lg:col-span-6 h-[50vh] lg:h-full relative rounded-[2rem] overflow-hidden shadow-soft border border-white bg-white">
        <div id="map-placeholder" class="map-overlay-text text-center flex flex-col items-center gap-4 bg-white/60 backdrop-blur-md p-8 rounded-3xl shadow-sm border border-white/50">
            <div class="w-16 h-16 bg-nature-50 rounded-full flex items-center justify-center text-nature-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            </div>
            <div>
                <h2 class="text-lg font-bold text-gray-800">去感受风的轨迹</h2>
                <p class="text-sm text-gray-500 mt-1">在左侧输入起点和终点，开始探索自然之旅</p>
            </div>
        </div>

        <div id="map" class="w-full h-full bg-[#f4f7f4]"></div>
    </main>

    <!-- ===== 右侧：详情面板 ===== -->
    <aside class="lg:col-span-3 flex flex-col h-full overflow-y-auto hide-scrollbar gap-4 pb-6 lg:pb-0">

        <div id="details-empty" class="h-full flex flex-col items-center justify-center text-center p-6 text-gray-400 gap-3">
            <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            <p class="text-sm">路线详情将在此显示</p>
        </div>

        <div id="details-content" class="hidden flex flex-col gap-4">

            <h2 class="text-lg font-bold text-gray-800 px-1">路线概览</h2>

            <div class="grid grid-cols-2 gap-3">
                <div class="glass-panel shadow-soft rounded-2xl p-4 flex flex-col gap-1">
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                        总距离
                    </div>
                    <div class="text-xl font-bold text-gray-800"><span id="stat-dist">0</span> <span class="text-sm font-normal text-gray-500">km</span></div>
                </div>
                <div class="glass-panel shadow-soft rounded-2xl p-4 flex flex-col gap-1">
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <svg class="w-4 h-4 text-nature-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                        总爬升
                    </div>
                    <div class="text-xl font-bold text-gray-800"><span id="stat-elev">0</span> <span class="text-sm font-normal text-gray-500">m</span></div>
                </div>
                <div class="glass-panel shadow-soft rounded-2xl p-4 flex flex-col gap-1">
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <svg class="w-4 h-4 text-earth-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        预计时间
                    </div>
                    <div class="text-xl font-bold text-gray-800"><span id="stat-time">0</span> <span class="text-sm font-normal text-gray-500">min</span></div>
                </div>
                <div class="glass-panel shadow-soft rounded-2xl p-4 flex flex-col gap-1">
                    <div class="flex items-center gap-1.5 text-xs text-gray-500">
                        <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        难度/路面
                    </div>
                    <div class="text-sm font-bold text-gray-800 truncate" id="stat-diff">-</div>
                </div>
            </div>

            <div class="glass-panel shadow-soft rounded-2xl p-5 flex flex-col gap-4 mt-2">
                <h3 class="text-sm font-bold text-gray-800 flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                    路线指引
                </h3>
                <div class="relative">
                    <div class="absolute left-[11px] top-2 bottom-2 w-0.5 bg-gray-100"></div>
                    <ul id="directions-list" class="flex flex-col gap-4 relative z-10"></ul>
                </div>
            </div>

            <div class="bg-earth-100/50 border border-earth-100 rounded-2xl p-4 flex gap-3 mt-2">
                <svg class="w-5 h-5 text-earth-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <div class="flex flex-col gap-1">
                    <h4 class="text-sm font-bold text-gray-800">自然骑行建议</h4>
                    <ul id="tips-list" class="text-xs text-gray-600 list-disc list-inside space-y-1"></ul>
                </div>
            </div>

        </div>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
